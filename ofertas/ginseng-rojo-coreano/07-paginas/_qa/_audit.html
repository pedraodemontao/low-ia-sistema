<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>audit</title></head>
<body>
<pre id="out">rodando...</pre>
<script>
const PAGES = ['index.html','results.html','upsell-1.html','downsell-1.html','upsell-2.html','downsell-2.html','gracias.html'];
const W = 390, H = 844;          // iPhone 14/15 lógico
const lines = [];

function auditDoc(doc, win, name) {
  const de = doc.documentElement;
  const r = [];
  const overflow = de.scrollWidth - de.clientWidth;
  r.push(`overflow_horizontal=${overflow > 1 ? overflow + 'px ❌' : 'não ✓'}`);

  // elementos que estouram a largura
  const wide = [];
  doc.querySelectorAll('body *').forEach(el => {
    const b = el.getBoundingClientRect();
    if (b.width > 0 && (b.right > W + 1 || b.left < -1)) {
      const cls = (typeof el.className === 'string' && el.className) ? '.' + el.className.trim().split(/\s+/)[0] : '';
      wide.push(`${el.tagName.toLowerCase()}${cls}(${Math.round(b.left)}→${Math.round(b.right)})`);
    }
  });
  r.push(`elementos_fora_da_tela=${wide.length}${wide.length ? ' :: ' + wide.slice(0,5).join(', ') : ' ✓'}`);

  // alvos de toque pequenos (< 44px de altura) — regra WCAG/Apple
  const small = [];
  doc.querySelectorAll('a,button,input,select,[role=button],.opt,.btn').forEach(el => {
    const b = el.getBoundingClientRect();
    if (b.width > 0 && b.height > 0 && b.height < 44) {
      const cls = (typeof el.className === 'string' && el.className) ? '.' + el.className.trim().split(/\s+/)[0] : '';
      small.push(`${el.tagName.toLowerCase()}${cls}=${Math.round(b.height)}px`);
    }
  });
  r.push(`toque_menor_44px=${small.length}${small.length ? ' :: ' + small.slice(0,6).join(', ') : ' ✓'}`);

  // texto pequeno demais para 50-62 anos
  const tiny = [];
  doc.querySelectorAll('body *').forEach(el => {
    if (!el.children.length && el.textContent.trim().length > 12) {
      const fs = parseFloat(win.getComputedStyle(el).fontSize);
      if (fs && fs < 12) tiny.push(`${el.tagName.toLowerCase()}=${fs}px`);
    }
  });
  r.push(`texto_menor_12px=${tiny.length}${tiny.length ? ' :: ' + tiny.slice(0,5).join(', ') : ' ✓'}`);

  // imagens sem width/height declarados (causam layout shift)
  const imgs = [...doc.querySelectorAll('img')];
  const noDim = imgs.filter(i => !i.getAttribute('width') && !i.style.aspectRatio &&
                                 !win.getComputedStyle(i).aspectRatio.match(/\d/));
  const noLazy = imgs.filter(i => i.loading !== 'lazy');
  r.push(`imgs=${imgs.length} sem_dimensao=${noDim.length} sem_lazy=${noLazy.length}`);
  if (noDim.length) r.push('   sem_dim :: ' + noDim.slice(0,12).map(i => (i.className||i.id||i.src.split('/').pop())).join(', '));
  return r.map(x => '   ' + x).join('\n');
}

(async () => {
  for (const p of PAGES) {
    await new Promise(res => {
      const f = document.createElement('iframe');
      f.width = W; f.height = H; f.style.border = '0';
      f.src = '../site/' + p;
      f.onload = () => {
        setTimeout(() => {
          let out;
          try { out = auditDoc(f.contentDocument, f.contentWindow, p); }
          catch (e) { out = '   ERRO: ' + e.message; }
          lines.push(`\n== ${p} ==\n${out}`);
          document.getElementById('out').textContent = lines.join('\n');
          f.remove(); res();
        }, 1200);
      };
      document.body.appendChild(f);
    });
  }
  document.getElementById('out').textContent = lines.join('\n') + '\n\nFIM';
})();
</script>
</body></html>
