<!-- Pixel: js/pixel.js · CAPI server-side e links Hotmart: pendentes -->

<script>
  /* Fallback global de imagen: mientras la etapa 6 no genera las fotos reales,
     cualquier <img> que falle cae al placeholder (fase de captura). */
  document.addEventListener('error', function (e) {
    if (e.target && e.target.tagName === 'IMG') {
      e.target.onerror = null;
      e.target.src = 'assets/placeholder.svg';
    }
  }, true);

  /* Stubs de tracking/experiment: los scripts originales (tracking.js / experiment.js /
     posthog / utmify / pixel) fueron removidos de este sitio estático. El engine llama
     a track() y getUTMQuery() como globales, estos stubs evitan ReferenceError.
     La etapa 9 reemplaza esto por el Pixel + CAPI reales. */
  /* Rede de segurança: pixel.js já define os dois. Se ele falhar ao carregar
     (bloqueador), estes fallbacks evitam ReferenceError e o quiz segue. */
  window.track = window.track || function () {};
  window.getUTMQuery = window.getUTMQuery || function () { return ''; };
</script>

<script src="js/config.js?v=4"></script>
<script src="js/engine.js?v=4"></script>
