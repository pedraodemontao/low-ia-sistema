<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { width:1200px; height:1200px; overflow:hidden; }
  .sq {
    width:1200px; height:1200px;
    background: linear-gradient(160deg, #8E1B1B 0%, #5C0F0F 55%, #3E0A0A 100%);
    color:#F7EFE3; text-align:center;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:80px 90px;
    font-family:"Palatino","Georgia",serif;
  }
  .marca { font-family:"Avenir Next","Helvetica Neue",sans-serif; font-size:26px; font-weight:600; letter-spacing:12px; text-transform:uppercase; color:#E3C56B; margin-bottom:70px; }
  h1 { font-size:84px; line-height:1.08; margin-bottom:44px; font-weight:700; color:#F7EFE3; }
  h1 .oro { color:#E3C56B; }
  .orn { color:#C9A227; font-size:40px; letter-spacing:26px; margin-bottom:44px; }
  .sub { font-size:34px; font-style:italic; color:#EAD9C4; max-width:860px; margin-bottom:80px; line-height:1.4; }
  .autor { font-family:"Avenir Next",sans-serif; font-size:28px; letter-spacing:7px; text-transform:uppercase; margin-bottom:70px; }
  .sello { width:170px; height:170px; border-radius:50%; border:4px solid #C9A227; display:flex; flex-direction:column; align-items:center; justify-content:center; font-family:"Avenir Next",sans-serif; font-size:17px; letter-spacing:3px; text-transform:uppercase; color:#E3C56B; }
  .sello b { font-size:56px; color:#F7EFE3; line-height:1.1; }
</style>
</head>
<body>
<div class="sq">
  <div class="marca">Ritual Seúl 50+</div>
  <h1>Protocolo Coreano<br><span class="oro">Anti-Manchas</span></h1>
  <div class="orn">❋ ❋ ❋</div>
  <div class="sub">Empareja el tono de tu piel en 21 días</div>
  <div class="autor">Dra. Mina Seo</div>
  <div class="sello"><span>Garantía</span><b>30</b><span>días</span></div>
</div>
</body>
</html>
